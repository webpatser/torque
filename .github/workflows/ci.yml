name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP 8.5
    timeout-minutes: 15

    services:
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Audit dependencies for known vulnerabilities
        run: composer audit --no-dev

      - name: Run tests
        run: ./vendor/bin/pest
